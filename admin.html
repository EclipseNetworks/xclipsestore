<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE STORE | MASTER COMMAND</title>
    <script>window.tailwindConfig = { dev: true };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; font-family: 'Nunito Sans', sans-serif; display: none; color: white; }
        .font-condensed { font-family: 'Roboto Condensed', sans-serif; }
        .tab-btn { transition: all 0.3s border; cursor: pointer; opacity: 0.4; }
        .tab-btn.active { border-bottom: 3px solid #FFF200; color: #FFF200 !important; opacity: 1; }
        .input-style { background: #111; border: 1px solid #222; padding: 12px; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; width: 100%; outline: none; color: white; transition: 0.3s; }
        .input-style:focus { border-color: #FFF200; box-shadow: 0 0 15px rgba(255, 242, 0, 0.1); }
        /* STYLED FOR LOCKED FIELDS */
        .input-locked { background: #0a0a0a !important; border: 1px solid #1a1a1a !important; color: #555 !important; cursor: not-allowed; font-style: italic; }
        .card-glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .price-display { background: rgba(255, 242, 0, 0.05); border-left: 3px solid #FFF200; padding: 15px; border-radius: 4px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-black border-b border-white/10 py-6 px-10 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-[#FFF200] font-condensed italic text-2xl font-black uppercase tracking-tighter">
            XCLIPSE <span class="text-white">STORE</span> <span class="text-gray-600 text-[10px] ml-2 tracking-[0.3em]">SECURE v4.0</span>
        </h1>
        <div class="flex gap-10">
            <button onclick="switchTab('inventory')" id="tab-inv" class="tab-btn active text-[10px] font-black uppercase tracking-[0.3em] pb-1">Registry</button>
            <button onclick="switchTab('catalog')" id="tab-cat" class="tab-btn text-[10px] font-black uppercase tracking-[0.3em] pb-1">Catalog View</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 lg:p-16">
        
        <div id="inventory-tab" class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div class="lg:col-span-5">
                <div class="card-glass p-10 sticky top-32 border-t-4 border-[#FFF200]">
                    <h2 class="font-condensed font-black uppercase italic text-2xl mb-6 text-[#FFF200]">Secure Injection</h2>
                    
                    <div class="mb-8">
                        <label class="text-[8px] font-black uppercase text-gray-500 mb-2 block tracking-widest">Authorized Presets Only</label>
                        <select id="preset-selector" class="input-style !border-[#FFF200]/30 text-[#FFF200]">
                            <option value="">-- SELECT TEMPLATE --</option>
                            <option value="tk_f_1k">TikTok Followers (1,000)</option>
                            <option value="tk_l_1k">TikTok Likes (1,000)</option>
                            <option value="tk_v_1k">TikTok Views (1,000)</option>
                            <option value="ig_f_1k">Instagram Followers (1,000)</option>
                            <option value="ig_l_1k">Instagram Likes (1,000)</option>
                            <option value="ig_v_1k">Instagram Views (1,000)</option>
                        </select>
                    </div>

                    <div class="price-display mb-8 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[8px] font-black uppercase text-gray-400 mb-1 block">Locked Rate</label>
                                <input type="text" id="base-rate" class="input-style input-locked" value="$0.00" readonly>
                            </div>
                            <div>
                                <label class="text-[8px] font-black uppercase text-gray-400 mb-1 block">Locked Volume</label>
                                <input type="text" id="p-unit-num" class="input-style input-locked" value="---" readonly>
                            </div>
                        </div>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-white/30">Registry Value:</span>
                            <span class="text-3xl font-black text-[#FFF200] italic font-condensed" id="calc-display">$0.00</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="p-name" class="input-style input-locked" placeholder="Asset Name" readonly>
                        <input type="text" id="p-platform" class="input-style input-locked" placeholder="Network" readonly>
                        
                        <div class="relative">
                            <textarea id="p-desc" rows="3" class="input-style" placeholder="Service Specifications..."></textarea>
                            <button id="auto-gen-btn" class="absolute bottom-2 right-2 text-[8px] bg-white text-black px-2 py-1 font-black uppercase rounded hover:bg-[#FFF200] transition">
                                <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Auto-Gen
                            </button>
                        </div>

                        <input type="hidden" id="p-price" value="0.00">
                        <button id="save-btn" class="w-full bg-[#FFF200] text-black py-5 font-black uppercase text-[11px] tracking-[0.4em] hover:bg-white transition shadow-xl shadow-[#FFF200]/5">
                            Authorize Injection
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-7">
                <div class="card-glass rounded-lg overflow-hidden border border-white/5">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-500 border-b border-white/5">
                            <tr>
                                <th class="p-6">Registry Hash</th>
                                <th class="p-6">Asset / Network</th>
                                <th class="p-6">Price (Locked)</th>
                                <th class="p-6 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="asset-table" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="catalog-tab" class="hidden">
            <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>

    </main>

    <script type="module">
        import { db, auth, onAuthStateChanged, getDoc, doc, collection, onSnapshot, query, orderBy, deleteDoc, addDoc, updateDoc, serverTimestamp, signOut } from './firebase.js';

        /* --------------------------------------------------
           THE MASTER MATRIX (LOCKED: VOLUME + PRICE)
           To update existing items, change values here and refresh.
           -------------------------------------------------- */
        const priceMatrix = {
            "tk_f_1k": { name: "TikTok Followers", plat: "TikTok", rate: 10.00, volume: 1000 },
            "tk_l_1k": { name: "TikTok Likes", plat: "TikTok", rate: 3.00, volume: 1000 },
            "tk_v_1k": { name: "TikTok Views", plat: "TikTok", rate: 4.00, volume: 1000 },
            "ig_f_1k": { name: "Instagram Followers", plat: "Instagram", rate: 11.00, volume: 1000 },
            "ig_l_1k": { name: "Instagram Likes", plat: "Instagram", rate: 3.00, volume: 1000 },
            "ig_v_1k": { name: "Instagram Views", plat: "Instagram", rate: 1.00, volume: 1000 }
        };

        // 1. SYNC ENGINE: Forces DB to match your HTML exactly
        const syncRegistryData = async (docs) => {
            for (const docSnap of docs) {
                const data = docSnap.data();
                // Find matching template by name and platform
                const key = Object.keys(priceMatrix).find(k => 
                    priceMatrix[k].name.toUpperCase() === data.name.toUpperCase() && 
                    priceMatrix[k].plat === data.platform
                );

                if (key) {
                    const template = priceMatrix[key];
                    const correctPrice = (template.rate * (template.volume / 1000)).toFixed(2);
                    
                    // Update if Price OR Volume (unit) doesn't match the code
                    if (data.price !== correctPrice || data.unit != template.volume) {
                        await updateDoc(doc(db, "assets", docSnap.id), { 
                            price: correctPrice,
                            unit: template.volume.toString()
                        });
                        console.log(`[LOCKED SYNC] ${data.name} synced to $${correctPrice}`);
                    }
                }
            }
        };

        // 2. AUTH GUARD
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().role === 'admin') {
                    document.body.style.display = "block";
                } else { window.location.href = "index.html"; }
            } else { window.location.href = "login.html"; }
        });

        // 3. PRESET HANDLER
        document.getElementById('preset-selector').onchange = (e) => {
            const val = e.target.value;
            if (!val) return;
            const p = priceMatrix[val];
            
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-platform').value = p.plat;
            document.getElementById('base-rate').value = `$${p.rate.toFixed(2)}`;
            document.getElementById('p-unit-num').value = p.volume;
            
            const total = (p.rate * (p.volume / 1000)).toFixed(2);
            document.getElementById('calc-display').innerText = `$${total}`;
            document.getElementById('p-price').value = total;
        };

        // 4. SNAPSHOT SYNC
        const q = query(collection(db, "assets"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            syncRegistryData(snapshot.docs); // Lock check
            
            const table = document.getElementById('asset-table');
            const grid = document.getElementById('catalog-grid');
            table.innerHTML = ''; grid.innerHTML = '';
            
            snapshot.forEach(docSnap => {
                const a = docSnap.data();
                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition border-b border-white/5">
                        <td class="p-6 text-[9px] text-gray-700 font-mono">#${docSnap.id.substring(0,6)}</td>
                        <td class="p-6">
                            <p class="font-black uppercase italic text-sm font-condensed tracking-tight">${a.name}</p>
                            <p class="text-[8px] font-black text-[#FFF200] opacity-50 uppercase tracking-widest">${a.platform}</p>
                        </td>
                        <td class="p-6 text-[#FFF200] font-black italic">$${a.price} <span class="text-gray-600 text-[10px] ml-1">/ ${a.unit}</span></td>
                        <td class="p-6 text-right"><button onclick="deleteAsset('${docSnap.id}')" class="text-white/20 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button></td>
                    </tr>`;

                grid.innerHTML += `
                    <div class="card-glass p-8 border-b-4 border-transparent hover:border-[#FFF200] transition group">
                        <div class="flex justify-between mb-4"><span class="bg-[#FFF200] text-black px-2 py-1 text-[8px] font-black uppercase rounded">XCLIPSE STORE</span><i class="fa-solid fa-shield-check text-white/5 text-[10px]"></i></div>
                        <h4 class="text-2xl font-black uppercase italic font-condensed mb-2">${a.name}</h4>
                        <p class="text-[10px] text-gray-500 font-bold uppercase mb-6 h-10 overflow-hidden">${a.desc}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5">
                            <span class="text-2xl font-black text-[#FFF200] italic font-condensed">$${a.price}</span>
                            <span class="text-[9px] font-black uppercase text-gray-600">${a.unit} UNITS</span>
                        </div>
                    </div>`;
            });
        });

        // 5. DB ACTIONS
        document.getElementById('save-btn').onclick = async () => {
            const asset = {
                name: document.getElementById('p-name').value.toUpperCase(),
                platform: document.getElementById('p-platform').value,
                unit: document.getElementById('p-unit-num').value, // This is now locked
                desc: document.getElementById('p-desc').value,
                price: document.getElementById('p-price').value,
                createdAt: serverTimestamp()
            };
            if(!asset.name || asset.price == "0.00") return alert("SELECT TEMPLATE");
            await addDoc(collection(db, "assets"), asset);
            ['p-name', 'p-desc', 'p-platform', 'base-rate', 'p-unit-num'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('preset-selector').value = '';
            document.getElementById('calc-display').innerText = '$0.00';
            alert("ASSET DEPLOYED SUCCESSFULLY");
        };

        window.switchTab = (tab) => {
            ['inventory', 'catalog'].forEach(t => document.getElementById(`${t}-tab`).classList.add('hidden'));
            document.getElementById(`${tab}-tab`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab === 'inventory' ? 'inv' : 'cat'}`).classList.add('active');
        };

        window.deleteAsset = async (id) => {
            if(confirm("Confirm asset deletion?")) await deleteDoc(doc(db, "assets", id));
        };

        document.getElementById('auto-gen-btn').onclick = () => {
            const name = document.getElementById('p-name').value;
            const plat = document.getElementById('p-platform').value;
            document.getElementById('p-desc').value = `Premium ${plat} ${name} injection. Secured via Xclipse Store protocols. 100% verified non-drop quality.`;
        };
    </script>
</body>
</html>
