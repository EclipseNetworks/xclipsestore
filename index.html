<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE STORE | Digital Performance Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sca-red: #e31b23; --sca-yellow: #ffde00; --sca-black: #1a1a1a; }
        body { background: #f4f4f4; font-family: 'Inter', sans-serif; color: var(--sca-black); }
        
        /* Retail Headings */
        .font-heading { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        
        /* Supercheap Aesthetic Components */
        .sc-header { background: var(--sca-black); border-bottom: 4px solid var(--sca-red); }
        .sc-promo-bar { background: var(--sca-red); color: white; font-weight: 800; font-size: 12px; text-align: center; padding: 8px; }
        
        .product-card { background: white; border: 1px solid #ddd; transition: box-shadow 0.2s; }
        .product-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: #ccc; }
        
        .btn-add { background: var(--sca-yellow); color: var(--sca-black); font-weight: 800; border-radius: 4px; transition: 0.2s; }
        .btn-add:hover { background: var(--sca-black); color: white; }
        
        .price-tag { color: var(--sca-red); font-size: 28px; font-weight: 900; }
        
        /* Cart Drawer */
        #cart-drawer { transform: translateX(100%); transition: 0.3s ease-in-out; }
        #cart-drawer.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="sc-promo-bar uppercase">
        🚀 FAST INJECTION PROTOCOLS — 24/7 DIGITAL DELIVERY 🚀
    </div>

    <!-- MAIN NAV -->
    <header class="sc-header sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-white font-heading text-2xl tracking-tighter italic">
                    XCLIPSE<span class="text-[var(--sca-yellow)]">STORE</span>
                </h1>
                <div class="hidden lg:flex bg-white/10 rounded p-1">
                    <input type="text" placeholder="Search for social assets..." class="bg-transparent text-white text-sm px-4 py-2 w-64 outline-none">
                    <button class="bg-[var(--sca-yellow)] px-4 py-2 rounded-sm text-black"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
            
            <button onclick="toggleCart()" class="flex items-center gap-3 bg-white/5 hover:bg-white/10 p-3 rounded transition relative">
                <i class="fa-solid fa-cart-shopping text-[var(--sca-yellow)] text-xl"></i>
                <div class="text-left leading-none">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">My Order</p>
                    <p id="nav-total" class="text-sm text-white font-bold">$0.00</p>
                </div>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-[var(--sca-red)] text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-black">0</span>
            </button>
        </div>
    </header>

    <!-- CONTENT SECTION -->
    <main class="max-w-7xl mx-auto px-4 py-10">
        
        <div class="mb-10 flex items-baseline gap-4 border-b-2 border-gray-200 pb-4">
            <h2 class="font-heading text-3xl">Performance Bundles</h2>
            <p class="text-gray-500 font-bold uppercase text-xs">Direct Injection Assets</p>
        </div>

        <!-- PRODUCT GRID -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- JavaScript Injects Retail Cards Here -->
        </div>
    </main>

    <!-- CART SIDEBAR -->
    <div id="overlay" class="overlay" onclick="toggleCart()"></div>
    <aside id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-50 shadow-2xl flex flex-col">
        <div class="p-6 bg-[var(--sca-black)] text-white flex justify-between items-center">
            <h3 class="font-heading text-xl">Order Summary</h3>
            <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            <!-- Cart Items -->
        </div>

        <div class="p-6 border-t shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-gray-500 uppercase text-sm">Estimated Total</span>
                <span id="cart-total" class="price-tag">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-[var(--sca-red)] text-white py-4 font-heading text-lg rounded hover:opacity-90 shadow-lg">
                Proceed to Checkout
            </button>
            <p class="text-center text-[10px] text-gray-400 mt-4 uppercase font-bold">Secure payment via Stripe Gateway</p>
        </div>
    </aside>

    <script>
        const assets = [
            { id: 'TKF', name: "TikTok Followers", platform: "TikTok", price: 10.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/3046/3046121.png" },
            { id: 'TKL', name: "TikTok Likes", platform: "TikTok", price: 3.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/1053/1053210.png" },
            { id: 'TKV', name: "TikTok Views", platform: "TikTok", price: 4.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/1179/1179120.png" },
            { id: 'IGF', name: "Instagram Followers", platform: "Instagram", price: 11.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/174/174855.png" },
            { id: 'IGL', name: "Instagram Likes", platform: "Instagram", price: 3.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/833/833472.png" },
            { id: 'IGV', name: "Instagram Views", platform: "Instagram", price: 1.00, volume: 1000, img: "https://cdn-icons-png.flaticon.com/512/1159/1159714.png" }
        ];

        let cart = [];

        function initStore() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = assets.map(a => `
                <div class="product-card p-6 flex flex-col text-center">
                    <div class="h-32 flex items-center justify-center mb-4">
                        <img src="${a.img}" class="h-20 w-20 object-contain opacity-80" alt="${a.name}">
                    </div>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">${a.platform} Performance</p>
                    <h4 class="font-bold text-lg leading-tight h-12 mb-2">${a.name} - ${a.volume} Unit Pack</h4>
                    
                    <div class="mt-auto pt-4">
                        <div class="price-tag mb-4">$${a.price.toFixed(2)}</div>
                        <button onclick="addToCart('${a.id}')" class="btn-add w-full py-3 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-plus"></i> ADD TO CART
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const asset = assets.find(a => a.id === id);
            cart.push({...asset, cartId: Date.now()});
            updateUI();
            if(!document.getElementById('cart-drawer').classList.contains('open')) toggleCart();
        };

        window.toggleCart = () => {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.removeItem = (cartId) => {
            cart = cart.filter(i => i.cartId !== cartId);
            updateUI();
        };

        function updateUI() {
            const total = cart.reduce((acc, i) => acc + i.price, 0).toFixed(2);
            document.getElementById('cart-total').innerText = `$${total}`;
            document.getElementById('nav-total').innerText = `$${total}`;
            document.getElementById('cart-count').innerText = cart.length;

            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `
                <div class="flex gap-4 border-b pb-4">
                    <img src="${i.img}" class="h-12 w-12 object-contain">
                    <div class="flex-grow">
                        <p class="font-bold text-sm text-black leading-none mb-1">${i.name}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">${i.volume} UNITS</p>
                        <p class="text-sm font-black text-[var(--sca-red)] mt-1">$${i.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${i.cartId})" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        window.checkout = () => {
            if(!cart.length) return alert("Your cart is empty!");
            window.location.href = "https://buy.stripe.com/your_link_here";
        };

        initStore();
    </script>
</body>
</html>
