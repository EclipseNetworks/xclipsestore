<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | SECURE LOGIN</title>
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LdBYassAAAAAE6SuOzq8hg2rGmstmaUELUpbseC"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Nunito Sans', sans-serif; color: white; }
        .font-condensed { font-family: 'Roboto Condensed', sans-serif; }
        .input-style { background: #111; border: 1px solid #333; padding: 16px; width: 100%; outline: none; color: white; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .btn-main { background: #FFF200; color: #000; padding: 16px; font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; width: 100%; }
        .btn-main:hover { background: #fff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full p-10 border-t-4 border-[#FFF200] bg-[#0a0a0a] shadow-2xl">
        <h2 class="font-condensed text-4xl font-black italic uppercase tracking-tighter mb-8 text-center">XCLIPSE <span class="text-[#FFF200]">ACCESS</span></h2>

        <form id="auth-form" class="space-y-4">
            <input type="email" id="email" class="input-style" placeholder="Network Email" required>
            <input type="password" id="password" class="input-style" placeholder="Security Key" required>
            
            <div class="flex gap-2 pt-2">
                <button type="submit" id="login-btn" class="btn-main">Login</button>
                <button type="button" id="signup-btn" class="btn-main !bg-transparent !text-white border border-gray-800 hover:!bg-white hover:!text-black">Register</button>
            </div>
        </form>

        <div class="mt-8 space-y-3">
            <button id="google-login" class="w-full border border-gray-900 py-3 text-[9px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition">Google Access</button>
            <button id="apple-login" class="w-full border border-gray-900 py-3 text-[9px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition">Apple Access</button>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, OAuthProvider, handleUserSync } from './firebase.js';

        const runCaptcha = async (action) => {
            return new Promise((resolve) => {
                grecaptcha.enterprise.ready(async () => {
                    const token = await grecaptcha.enterprise.execute('6LdBYassAAAAAE6SuOzq8hg2rGmstmaUELUpbseC', {action: action});
                    resolve(token);
                });
            });
        };

        // --- REGISTER (Direct) ---
        document.getElementById('signup-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("MISSING DATA");

            await runCaptcha('signup');
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await handleUserSync(res.user);
                window.location.href = "my-account.html";
            } catch (err) { alert("REGISTRY ERROR: " + err.message); }
        };

        // --- LOGIN (Direct) ---
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            await runCaptcha('login');
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = "my-account.html";
            } catch (err) { alert("AUTH FAILED: Check keys."); }
        };

        // --- SOCIAL ---
        const doSocial = async (provider) => {
            await runCaptcha('social_auth');
            try {
                const res = await signInWithPopup(auth, provider);
                await handleUserSync(res.user);
                window.location.href = "my-account.html";
            } catch (err) { console.error(err); }
        };

        document.getElementById('google-login').onclick = () => doSocial(new GoogleAuthProvider());
        document.getElementById('apple-login').onclick = () => doSocial(new OAuthProvider('apple.com'));
    </script>
</body>
</html>
